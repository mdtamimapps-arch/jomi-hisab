<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐾 ফুটপ্রিন্ট ট্র্যাকার প্রো + জমির হিসাব | বাংলাদেশ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #141428;
            --surface2: #1e1e36;
            --accent: #00e5ff;
            --accent2: #ff6ec7;
            --text: #e8e8f0;
            --text2: #b0b0c0;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffa502;
            --radius: 18px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', 'Noto Sans Bengali', system-ui, sans-serif;
            background: var(--bg);
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ── */
        .top-bar {
            background: var(--surface);
            padding: 6px 8px;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            flex-shrink: 0;
        }
        .top-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #fff;
            white-space: nowrap;
        }
        .paw {
            font-size: 1.2rem;
            animation: bouncePaw 0.6s infinite alternate;
        }
        @keyframes bouncePaw {
            0% {
                transform: translateY(0) rotate(-5deg);
            }
            100% {
                transform: translateY(-4px) rotate(5deg);
            }
        }
        .search-wrap {
            flex: 1;
            min-width: 120px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 7px 30px 7px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: #1a1a2e;
            color: #fff;
            font-size: 0.75rem;
            outline: none;
            font-family: inherit;
            transition: 0.2s;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.2);
        }
        .search-input::placeholder {
            color: #777;
        }
        .search-clear {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px 6px;
            display: none;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: 12px;
            margin-top: 4px;
            max-height: 180px;
            overflow-y: auto;
            z-index: 2000;
            display: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
        }
        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 0.7rem;
            color: #ddd;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.15s;
        }
        .search-result-item:hover,
        .search-result-item:active {
            background: var(--surface2);
            color: #fff;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 5px 9px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--surface2);
            color: #ccc;
            cursor: pointer;
            font-size: 0.65rem;
            font-weight: 600;
            transition: 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }
        .lang-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.4);
        }
        .vehicle-select {
            padding: 5px 6px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: var(--surface2);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }
        .vehicle-select option {
            background: #1a1a2e;
            color: #fff;
        }
        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--danger);
            transition: 0.4s;
            box-shadow: 0 0 6px var(--danger);
            flex-shrink: 0;
        }
        .status-dot.active {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 5px var(--success);
            }
            50% {
                box-shadow: 0 0 18px var(--success), 0 0 30px rgba(46, 213, 115, 0.5);
            }
        }
        .accuracy-badge {
            font-size: 0.6rem;
            padding: 3px 7px;
            border-radius: 12px;
            background: var(--surface2);
            color: var(--text2);
            font-weight: 600;
            white-space: nowrap;
        }

        /* ── Map ── */
        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
            background: #1a1a2e;
        }
        .leaflet-container {
            background: #1a1a2e !important;
        }
        .leaflet-control-zoom a {
            background: var(--surface) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 10px !important;
        }
        .leaflet-control-layers {
            background: var(--surface) !important;
            border-radius: 12px !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
        }
        .leaflet-control-layers label {
            color: #ddd !important;
            font-size: 0.7rem;
        }

        /* Custom locate button */
        .locate-btn {
            background: var(--surface) !important;
            color: #fff !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 10px !important;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            transition: 0.2s;
        }
        .locate-btn:hover {
            background: var(--surface2) !important;
            border-color: var(--accent) !important;
        }
        .locate-btn.locating {
            animation: spin 1s linear infinite;
            color: var(--accent);
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Bottom Panel ── */
        .bottom-panel {
            background: var(--surface);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 1000;
            flex-shrink: 0;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 25px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            max-height: 44vh;
            overflow-y: auto;
        }
        .tab-row {
            display: flex;
            background: var(--surface2);
            border-radius: 20px 20px 0 0;
            padding: 4px;
            gap: 4px;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 4px;
            border: none;
            background: transparent;
            color: #aaa;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 16px;
            font-family: inherit;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
        }
        .panel-content {
            padding: 10px 12px;
            display: none;
        }
        .panel-content.active {
            display: block;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }
        .stat-card {
            background: var(--surface2);
            border-radius: 14px;
            padding: 8px 5px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .stat-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-value.speed {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }
        .stat-value.dist {
            color: var(--accent2);
            text-shadow: 0 0 10px rgba(255, 110, 199, 0.3);
        }
        .stat-value.time {
            color: var(--warning);
            text-shadow: 0 0 10px rgba(255, 165, 2, 0.3);
        }
        .stat-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text2);
            font-weight: 600;
        }
        .stat-sub {
            font-size: 0.5rem;
            color: #888;
        }
        .btn-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            min-width: 50px;
            padding: 10px 6px;
            border-radius: 24px;
            border: none;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.25s;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            font-family: inherit;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-start {
            background: linear-gradient(135deg, #2ed573, #1abc5e);
            box-shadow: 0 4px 14px rgba(46, 213, 115, 0.25);
        }
        .btn-pause {
            background: linear-gradient(135deg, #ffa502, #e68a00);
            box-shadow: 0 4px 14px rgba(255, 165, 2, 0.25);
        }
        .btn-stop {
            background: linear-gradient(135deg, #ff4757, #d63031);
            box-shadow: 0 4px 14px rgba(255, 71, 87, 0.25);
        }
        .btn-reset {
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            flex: 0.4;
        }
        .btn-share {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            box-shadow: 0 4px 14px rgba(108, 92, 231, 0.25);
            flex: 0.5;
            font-size: 0.65rem;
        }
        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(25%);
        }
        .btn .icon {
            font-size: 0.9rem;
        }

        /* ── Land tools ── */
        .sub-tab-row {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            background: var(--surface);
            padding: 4px 0;
            z-index: 1;
        }
        .sub-tab {
            padding: 7px 10px;
            border-radius: 18px;
            background: var(--surface2);
            border: none;
            color: #ccc;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }
        .sub-tab.active {
            background: var(--accent);
            color: #000;
        }
        .land-card {
            background: var(--surface2);
            border-radius: 14px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #e0e0e8;
        }
        .land-card p,
        .land-card span,
        .land-card div,
        .land-card b,
        .land-card small,
        .land-card i {
            color: #e0e0e8 !important;
        }
        .input-group {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .input-group input,
        .input-group select {
            padding: 8px 10px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #1a1a2e;
            color: #fff;
            font-size: 0.75rem;
            outline: none;
            font-family: inherit;
            min-width: 70px;
            flex: 1;
        }
        .input-group input::placeholder {
            color: #666;
        }
        .result-list {
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.75rem;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: center;
            gap: 5px;
            color: #e0e0e8 !important;
        }
        .result-item span {
            color: #e0e0e8 !important;
        }
        .copy-btn {
            background: var(--accent);
            border: none;
            color: #000 !important;
            padding: 3px 7px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.6rem;
            white-space: nowrap;
        }
        .survey-actions {
            display: flex;
            gap: 6px;
            margin: 6px 0;
            flex-wrap: wrap;
        }
        .vehicle-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.6)) drop-shadow(0 0 12px rgba(0, 229, 255, 0.5));
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        .footprint-annotation {
            background: var(--surface);
            color: #fff;
            padding: 5px 9px;
            border-radius: 14px;
            font-size: 0.6rem;
            font-weight: 600;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        @media (min-width: 500px) {
            .stat-value {
                font-size: 1.3rem;
            }
            .btn {
                font-size: 0.8rem;
            }
            .search-input {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ── Top Bar ── -->
    <div class="top-bar" id="topBar">
        <div class="top-row">
            <div class="logo"><span class="paw">🐾</span><span data-lang="title">ফুটপ্রিন্ট ট্র্যাকার</span></div>
            <div class="search-wrap">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 স্থান খুঁজুন... (ঢাকা, গুলশান)"
                oninput="handleSearchInput()" onfocus="handleSearchInput()" autocomplete="off">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
                <div class="search-results" id="searchResults"></div>
            </div>
            <div class="controls">
                <button class="lang-btn active" id="langBn" onclick="setLanguage('bn')">বাংলা</button>
                <button class="lang-btn" id="langEn" onclick="setLanguage('en')">English</button>
                <select class="vehicle-select" id="vehicleSelect" onchange="changeVehicle()">
                    <option value="car" data-lang="car">🚗 গাড়ি</option>
                    <option value="bike" data-lang="bike">🏍 বাইক</option>
                    <option value="walk" data-lang="walk">🚶 হাঁটা</option>
                    <option value="cycle" data-lang="cycle">🚲 সাইকেল</option>
                </select>
                <span class="accuracy-badge" id="accuracyBadge">🎯 প্রস্তুত</span>
                <div class="status-dot" id="statusDot"></div>
            </div>
        </div>
    </div>

    <!-- ── Map ── -->
    <div id="map"></div>

    <!-- ── Bottom Panel ── -->
    <div class="bottom-panel" id="bottomPanel">
        <div class="tab-row">
            <button class="tab-btn active" data-tab="tracker">📍 ট্র্যাকার</button>
            <button class="tab-btn" data-tab="land">📐 জমির হিসাব</button>
        </div>

        <!-- Tracker Panel -->
        <div class="panel-content active" id="trackerContent">
            <div class="stats">
                <div class="stat-card"><div class="stat-value speed" id="speedVal">0.0</div><div class="stat-label" data-lang="speedLabel">⚡ গতি</div><div class="stat-sub" id="speedMph">0.0 mph</div></div>
                <div class="stat-card"><div class="stat-value dist" id="distVal">0</div><div class="stat-label" data-lang="distLabel">📏 দূরত্ব</div><div class="stat-sub" id="distMiles">0.00 মাইল</div></div>
                <div class="stat-card"><div class="stat-value time" id="timeVal">00:00</div><div class="stat-label" data-lang="timeLabel">⏱ সময়</div><div class="stat-sub" id="segmentInfo">পরবর্তী: --</div></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-start" id="btnStart"><span class="icon">▶</span> <span data-lang="startBtn">শুরু</span></button>
                <button class="btn btn-pause" id="btnPause" disabled><span class="icon">⏸</span> <span data-lang="pauseBtn">বিরতি</span></button>
                <button class="btn btn-stop" id="btnStop" disabled><span class="icon">⏹</span> <span data-lang="stopBtn">থামুন</span></button>
                <button class="btn btn-reset" id="btnReset"><span class="icon">🔄</span></button>
                <button class="btn btn-share" id="btnShare" onclick="sharePrintReport()" title="শেয়ার / প্রিন্ট">🖨️📤</button>
            </div>
        </div>

        <!-- Land Panel -->
        <div class="panel-content" id="landContent">
            <div class="sub-tab-row">
                <button class="sub-tab active" data-land="conversion">🔄 রূপান্তর</button>
                <button class="sub-tab" data-land="area">📏 ক্ষেত্রফল</button>
                <button class="sub-tab" data-land="price">💰 মূল্য</button>
            </div>
            <div id="landConversion" class="land-card">
                <div class="input-group">
                    <input type="number" id="convValue" placeholder="মান" value="1" oninput="convertUnits()">
                    <select id="convUnit" onchange="convertUnits()">
                        <option value="katha">কাঠা</option><option value="bigha">বিঘা</option>
                        <option value="decimal" selected>শতাংশ/ডেসিমেল</option>
                        <option value="kani">কানি</option><option value="gonda">গণ্ডা</option>
                        <option value="kora">কড়া</option><option value="sqft">বর্গফুট</option>
                        <option value="sqm">বর্গমিটার</option><option value="acre">একর</option>
                    </select>
                </div>
                <div class="result-list" id="convResults"></div>
            </div>
            <div id="landArea" class="land-card" style="display:none;">
                <p style="font-size:0.75rem;margin-bottom:5px;">📐 জিপিএস জরিপ বা ট্রাপিজিয়াম</p>
                <button class="btn" style="background:var(--accent);margin-bottom:5px;color:#000;" id="btnStartSurvey">📍 পয়েন্ট জরিপ শুরু</button>
                <div id="surveyPointsList" style="font-size:0.65rem;color:#bbb;"></div>
                <div class="survey-actions">
                    <button class="btn" style="background:var(--warning);" id="btnAddCurrent">📍 বর্তমান অবস্থান</button>
                    <button class="btn" style="background:var(--danger);" id="btnClosePoly">🔒 বহুভুজ বন্ধ</button>
                    <button class="btn" style="background:var(--surface2);" id="btnClearSurvey">🗑️ মুছুন</button>
                </div>
                <div id="surveyAreaResult" style="font-size:0.75rem;color:var(--accent2);"></div>
                <hr style="border-color:rgba(255,255,255,0.08);margin:8px 0;">
                <p style="font-size:0.65rem;">বা ট্রাপিজিয়াম বাহু (ফুট):</p>
                <div class="input-group">
                    <input type="number" id="trapSideA" placeholder="১ম জোড়া বাহু">
                    <input type="number" id="trapSideB" placeholder="২য় জোড়া বাহু">
                </div>
                <button class="btn" style="background:var(--accent2);" id="btnCalcTrap">হিসাব</button>
                <div id="trapResult" style="font-size:0.7rem;margin-top:5px;color:#e0e0e8;"></div>
            </div>
            <div id="landPrice" class="land-card" style="display:none;">
                <div class="input-group">
                    <input type="number" id="priceRate" placeholder="প্রতি এককের দাম (৳)">
                    <select id="priceUnit">
                        <option value="katha">কাঠা</option><option value="decimal">শতাংশ</option>
                        <option value="kora">কড়া</option><option value="bigha">বিঘা</option>
                        <option value="kani">কানি</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="number" id="totalAreaInput" placeholder="মোট জমির পরিমাণ">
                </div>
                <button class="btn" style="background:var(--success);" id="btnCalcPrice">মোট মূল্য দেখুন</button>
                <div id="priceResult" style="margin-top:6px;color:#e0e0e8;"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────── LANGUAGE ────────────────────────────
            const translations = {
                bn: { title: 'ফুটপ্রিন্ট ট্র্যাকার', car: '🚗 গাড়ি', bike: '🏍 বাইক', walk: '🚶 হাঁটা', cycle: '🚲 সাইকেল',
                    speedLabel: '⚡ গতি (কিমি/ঘ)', distLabel: '📏 মোট দূরত্ব', timeLabel: '⏱ সময়', startBtn: 'শুরু',
                    pauseBtn: 'বিরতি', stopBtn: 'থামুন', segmentNext: 'পরবর্তী: --', segmentLast: 'শেষ:', ready: '🎯 প্রস্তুত',
                    searching: '🔍 খোঁজা হচ্ছে...', stopped: '⏹ থামানো', reset: '🔄 রিসেট', error: '⚠️ ত্রুটি',
                    startAnnotation: '📍 শুরু', meters: 'মি', km: 'কিমি', miles: 'মাইল', shareTitle: 'ফুটপ্রিন্ট রিপোর্ট',
                    totalDist: 'মোট দূরত্ব', totalTime: 'মোট সময়', avgSpeed: 'গড় গতি', vehicle: 'যানবাহন',
                    pointsRecorded: 'পয়েন্ট রেকর্ড', date: 'তারিখ', print: 'প্রিন্ট', close: 'বন্ধ' },
                en: { title: 'Footprint Tracker', car: '🚗 Car', bike: '🏍 Bike', walk: '🚶 Walking', cycle: '🚲 Bicycle',
                    speedLabel: '⚡ Speed (km/h)', distLabel: '📏 Distance', timeLabel: '⏱ Time', startBtn: 'Start',
                    pauseBtn: 'Pause', stopBtn: 'Stop', segmentNext: 'Next: --', segmentLast: 'Last:', ready: '🎯 Ready',
                    searching: '🔍 Searching...', stopped: '⏹ Stopped', reset: '🔄 Reset', error: '⚠️ Error',
                    startAnnotation: '📍 Start', meters: 'm', km: 'km', miles: 'mi', shareTitle: 'Footprint Report',
                    totalDist: 'Total Distance', totalTime: 'Total Time', avgSpeed: 'Avg Speed', vehicle: 'Vehicle',
                    pointsRecorded: 'Points Recorded', date: 'Date', print: 'Print', close: 'Close' }
            };
            let currentLang = 'bn';
            window.setLanguage = function(lang) {
                currentLang = lang;
                document.getElementById('langBn').classList.toggle('active', lang === 'bn');
                document.getElementById('langEn').classList.toggle('active', lang === 'en');
                document.querySelectorAll('[data-lang]').forEach(el => {
                    const k = el.getAttribute('data-lang');
                    if (translations[lang] && translations[lang][k]) el.textContent = translations[lang][k];
                });
                const opts = document.getElementById('vehicleSelect').options;
                for (let i = 0; i < opts.length; i++) {
                    const k = opts[i].getAttribute('data-lang');
                    if (translations[lang] && translations[lang][k]) opts[i].textContent = translations[lang][k];
                }
                updateUI();
                if (document.getElementById('landContent').classList.contains('active')) convertUnits();
            };

            function t(key) { return (translations[currentLang] && translations[currentLang][key]) ? translations[
                    currentLang][key] : key; }

            // ──────────────────────────── STATE ────────────────────────────
            const state = {
                tracking: false,
                paused: false,
                positions: [],
                totalDistanceMeters: 0,
                watchId: null,
                startTime: null,
                elapsedBeforePause: 0,
                pauseStart: null,
                lastPosition: null,
                segmentDistances: [],
                vehicleType: 'car',
                currentBearing: 0,
                animFrame: null,
                targetLatLng: null
            };
            let surveyPoints = [];
            let surveyActive = false;
            let surveyLine = null;
            let searchTimeout = null;

            // ──────────────────────────── DOM ────────────────────────────
            const statusDot = document.getElementById('statusDot');
            const accuracyBadge = document.getElementById('accuracyBadge');
            const speedVal = document.getElementById('speedVal');
            const speedMph = document.getElementById('speedMph');
            const distVal = document.getElementById('distVal');
            const distMiles = document.getElementById('distMiles');
            const timeVal = document.getElementById('timeVal');
            const segmentInfo = document.getElementById('segmentInfo');
            const btnStart = document.getElementById('btnStart');
            const btnPause = document.getElementById('btnPause');
            const btnStop = document.getElementById('btnStop');
            const vehicleSelect = document.getElementById('vehicleSelect');
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const searchClear = document.getElementById('searchClear');

            // ──────────────────────────── MAP ────────────────────────────
            const map = L.map('map', {
                zoomControl: true,
                attributionControl: false,
                zoom: 7,
                maxZoom: 22,
                minZoom: 4
            }).setView([23.6850, 90.3563], 7);
            const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22,
                maxNativeZoom: 19 });
            const esriSatellite = L.tileLayer(
                'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxZoom: 22,
                    maxNativeZoom: 19
                });
            const cartoLabels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
                maxZoom: 22,
                maxNativeZoom: 19,
                subdomains: 'abcd',
                opacity: 0.85
            });
            const cartoDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 22,
                maxNativeZoom: 19, subdomains: 'abcd' });
            osmStandard.addTo(map);
            L.control.layers({ "🗺️ স্ট্রিট": osmStandard, "🌙 ডার্ক": cartoDark, "🛰️ স্যাটেলাইট": esriSatellite },
                { "🏷️ লেবেল": cartoLabels }, { position: 'topright', collapsed: true }).addTo(map);

            // Custom Locate Button (like Google Maps)
            const LocateControl = L.Control.extend({
                options: { position: 'bottomright' },
                onAdd: function() {
                    const btn = L.DomUtil.create('div', 'locate-btn');
                    btn.innerHTML = '◎';
                    btn.title = 'বর্তমান অবস্থানে যান';
                    btn.onclick = function(e) {
                        e.stopPropagation();
                        goToCurrentLocation();
                    };
                    return btn;
                }
            });
            new LocateControl().addTo(map);

            function goToCurrentLocation() {
                const btn = document.querySelector('.locate-btn');
                if (btn) btn.classList.add('locating');
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const { latitude, longitude } = pos.coords;
                        map.flyTo([latitude, longitude], 17, { duration: 1.2 });
                        if (btn) btn.classList.remove('locating');
                        if (!currentMarker) {
                            currentMarker = L.marker([latitude, longitude], {
                                icon: createVehicleIcon(state.vehicleType),
                                zIndexOffset: 1000,
                                interactive: false
                            }).addTo(map);
                        }
                        currentMarker.setLatLng([latitude, longitude]);
                    }, () => {
                        if (btn) btn.classList.remove('locating');
                        alert('অবস্থান পাওয়া যায়নি। GPS অন করুন।');
                    }, { enableHighAccuracy: true, timeout: 10000 });
                } else {
                    if (btn) btn.classList.remove('locating');
                    alert('Geolocation সমর্থিত নয়।');
                }
            }

            // Custom pane
            map.createPane('footprints');
            map.getPane('footprints').style.zIndex = 500;
            map.getPane('footprints').style.pointerEvents = 'none';
            const pathLine = L.polyline([], { color: '#ff6ec7', weight: 4, opacity: 0.85, pane: 'footprints',
                dashArray: '8 6' }).addTo(map);
            const glowLine = L.polyline([], { color: '#ff6ec7', weight: 10, opacity: 0.2, pane: 'footprints' }).addTo(
            map);
            const footprintMarkers = L.layerGroup().addTo(map);
            const annotationLayer = L.layerGroup().addTo(map);
            const surveyMarkers = L.layerGroup().addTo(map);
            const vehicleIcons = { car: '🚗', bike: '🏍️', walk: '🚶', cycle: '🚲' };
            let currentMarker = null;

            function createVehicleIcon(type) {
                return L.divIcon({
                    className: '',
                    html: `<div class="vehicle-icon" style="font-size:30px;">${vehicleIcons[type]||'🚗'}</div>`,
                    iconSize: [38, 38],
                    iconAnchor: [19, 19]
                });
            }
            window.changeVehicle = function() {
                state.vehicleType = vehicleSelect.value;
                if (currentMarker) currentMarker.setIcon(createVehicleIcon(state.vehicleType));
            };

            // ──────────────────────────── SEARCH ────────────────────────────
            window.handleSearchInput = function() {
                const q = searchInput.value.trim();
                searchClear.style.display = q ? 'block' : 'none';
                if (searchTimeout) clearTimeout(searchTimeout);
                if (q.length < 2) { searchResults.style.display = 'none';
                    searchResults.innerHTML = ''; return; }
                searchTimeout = setTimeout(() => {
                    fetch(
                            `https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=bn,en&q=${encodeURIComponent(q)}`
                            )
                        .then(r => r.json())
                        .then(data => {
                            if (data.length === 0) {
                                searchResults.innerHTML =
                                    '<div class="search-result-item" style="color:#888;">কোনো ফলাফল পাওয়া যায়নি</div>';
                            } else {
                                searchResults.innerHTML = data.map((d, i) =>
                                    `<div class="search-result-item" onclick="selectSearchResult(${d.lat},${d.lon},'${d.display_name.replace(/'/g,"\\'")}')">📍 ${d.display_name}</div>`
                                    ).join('');
                            }
                            searchResults.style.display = 'block';
                        })
                        .catch(() => {
                            searchResults.innerHTML =
                                '<div class="search-result-item" style="color:#ff6b6b;">সার্চ ত্রুটি</div>';
                            searchResults.style.display = 'block';
                        });
                }, 400);
            };
            window.selectSearchResult = function(lat, lon, name) {
                map.flyTo([lat, lon], 16, { duration: 1 });
                searchInput.value = name.substring(0, 40);
                searchResults.style.display = 'none';
                searchClear.style.display = 'block';
                L.popup().setLatLng([lat, lon]).setContent(`<b>${name}</b>`).openOn(map);
            };
            window.clearSearch = function() {
                searchInput.value = '';
                searchResults.style.display = 'none';
                searchResults.innerHTML = '';
                searchClear.style.display = 'none';
            };
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-wrap')) { searchResults.style.display = 'none'; }
            });

            // ──────────────────────────── TRACKER HELPERS ────────────────────────────
            function haversine(lat1, lo1, lat2, lo2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLo = (lo2 - lo1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math
                    .sin(dLo / 2) ** 2;
                return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            }

            function bearing(lat1, lo1, lat2, lo2) {
                const dLo = (lo2 - lo1) * Math.PI / 180;
                const y = Math.sin(dLo) * Math.cos(lat2 * Math.PI / 180);
                const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) - Math.sin(lat1 * Math.PI / 180) *
                    Math.cos(lat2 * Math.PI / 180) * Math.cos(dLo);
                return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            }

            function formatDist(m) {
                if (m < 1) return '0 ' + t('meters');
                if (m < 1000) return Math.round(m) + ' ' + t('meters');
                return (m / 1000).toFixed(2) + ' ' + t('km');
            }

            function metersToMiles(m) { return m * 0.000621371; }

            function formatTime(ms) {
                const s = Math.floor(ms / 1000);
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
                return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
            }

            function getElapsed() {
                if (!state.startTime) return 0;
                if (state.paused && state.pauseStart) return state.elapsedBeforePause;
                return state.elapsedBeforePause + (Date.now() - (state.pauseStart || state.startTime));
            }

            function animateMarker(lat, lng, brng) { state.targetLatLng = [lat, lng];
                state.currentBearing = brng; if (!state.animFrame) smoothStep(); }

            function smoothStep() {
                if (!currentMarker || !map.hasLayer(currentMarker) || !state.targetLatLng) { state.animFrame = null; return; }
                const cur = currentMarker.getLatLng(),
                    tgt = state.targetLatLng;
                const dx = tgt[0] - cur.lat,
                    dy = tgt[1] - cur.lng,
                    dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 0.000001) { currentMarker.setLatLng(tgt);
                    state.animFrame = null; return; }
                const step = Math.min(dist, 0.0003),
                    ratio = step / dist;
                currentMarker.setLatLng([cur.lat + dx * ratio, cur.lng + dy * ratio]);
                const el = currentMarker.getElement();
                if (el) { const vd = el.querySelector('.vehicle-icon'); if (vd) vd.style.transform =
                        `rotate(${state.currentBearing}deg)`; }
                state.animFrame = requestAnimationFrame(smoothStep);
            }

            function updateUI() {
                timeVal.textContent = formatTime(getElapsed());
                if (state.lastPosition && state.lastPosition.speed != null && state.tracking && !state.paused) {
                    const kmh = state.lastPosition.speed * 3.6;
                    speedVal.textContent = kmh.toFixed(1);
                    speedMph.textContent = (kmh * 0.621371).toFixed(1) + ' mph';
                } else { speedVal.textContent = '0.0';
                    speedMph.textContent = '0.0 mph'; }
                distVal.textContent = formatDist(state.totalDistanceMeters);
                distMiles.textContent = metersToMiles(state.totalDistanceMeters).toFixed(2) + ' ' + t('miles');
                segmentInfo.textContent = state.segmentDistances.length ? t('segmentLast') + ' ' + formatDist(state
                    .segmentDistances[state.segmentDistances.length - 1]) : t('segmentNext');
                if (state.lastPosition && state.lastPosition.accuracy) {
                    const a = state.lastPosition.accuracy;
                    accuracyBadge.textContent = '🎯 ±' + Math.round(a) + 'm';
                    accuracyBadge.style.color = a < 10 ? '#2ed573' : a < 25 ? '#ffa502' : '#ff4757';
                }
            }

            function addFootprint(lat, lng, label) {
                const ic = L.divIcon({
                    className: '',
                    html: '<div style="width:6px;height:6px;background:#ff6ec7;border-radius:50%;box-shadow:0 0 7px #ff6ec7;border:1px solid #fff;"></div>',
                    iconSize: [6, 6],
                    iconAnchor: [3, 3]
                });
                L.marker([lat, lng], { icon: ic, pane: 'footprints', interactive: false }).addTo(footprintMarkers);
                if (label) {
                    const aic = L.divIcon({
                        className: 'footprint-annotation',
                        html: label,
                        iconSize: null,
                        iconAnchor: [22, 8]
                    });
                    const m = L.marker([lat, lng], { icon: aic, interactive: false, pane: 'footprints' }).addTo(
                        annotationLayer);
                    setTimeout(() => annotationLayer.removeLayer(m), 8000);
                }
            }

            function addPosition(lat, lng, acc, spd) {
                const pos = { lat, lng, timestamp: Date.now(), accuracy: acc, speed: spd };
                state.positions.push(pos);
                if (state.lastPosition && state.tracking && !state.paused) {
                    const seg = haversine(state.lastPosition.lat, state.lastPosition.lng, lat, lng);
                    if (seg > 0.3) { state.totalDistanceMeters += seg;
                        state.segmentDistances.push(seg);
                        addFootprint(lat, lng, state.segmentDistances.length === 1 ? t('startAnnotation') : formatDist(
                            seg)); }
                } else if (state.positions.length === 1) addFootprint(lat, lng, t('startAnnotation'));
                let brng = state.currentBearing;
                if (state.lastPosition) brng = bearing(state.lastPosition.lat, state.lastPosition.lng, lat, lng);
                state.lastPosition = pos;
                pathLine.setLatLngs(state.positions.map(p => [p.lat, p.lng]));
                glowLine.setLatLngs(state.positions.map(p => [p.lat, p.lng]));
                if (!currentMarker) { currentMarker = L.marker([lat, lng], { icon: createVehicleIcon(state.vehicleType),
                        zIndexOffset: 1000, interactive: false }).addTo(map); }
                animateMarker(lat, lng, brng);
                if (state.tracking && !state.paused) map.panTo([lat, lng], { animate: true, duration: 0.5 });
                updateUI();
            }

            function startWatching() {
                if (!navigator.geolocation) return;
                state.watchId = navigator.geolocation.watchPosition(pos => {
                    const { latitude, longitude, accuracy, speed } = pos.coords;
                    if (state.tracking && !state.paused) addPosition(latitude, longitude, accuracy, speed);
                    else if (!state.tracking && state.positions.length === 0) {
                        state.lastPosition = { lat: latitude, lng: longitude, accuracy, speed, timestamp: Date
                                .now() };
                        if (!currentMarker) { currentMarker = L.marker([latitude, longitude], { icon: createVehicleIcon(
                                    state.vehicleType), zIndexOffset: 1000, interactive: false }).addTo(
                                map); }
                        currentMarker.setLatLng([latitude, longitude]);
                        map.setView([latitude, longitude], 16);
                        accuracyBadge.textContent = '🎯 ±' + Math.round(accuracy) + 'm';
                        updateUI();
                    }
                }, err => { accuracyBadge.textContent = t('error');
                    accuracyBadge.style.color = '#ff4757'; }, { enableHighAccuracy: true, timeout: 20000,
                    maximumAge: 300 });
            }

            // ──────────────────────────── TRACKER BUTTONS ────────────────────────────
            function resumeTracking() {
                if (!state.tracking || !state.paused) return;
                state.paused = false;
                state.pauseStart = null;
                statusDot.classList.add('active');
                statusDot.style.background = '#2ed573';
                statusDot.style.boxShadow = '0 0 12px #2ed573';
                document.querySelector('#btnPause span:last-child').textContent = currentLang === 'bn' ? '⏸ বিরতি' :
                    '⏸ Pause';
                btnStart.disabled = true;
                updateUI();
            }

            function pauseTracking() {
                if (!state.tracking || state.paused) return;
                state.paused = true;
                state.pauseStart = Date.now();
                state.elapsedBeforePause = getElapsed();
                statusDot.classList.remove('active');
                statusDot.style.background = '#ffa502';
                statusDot.style.boxShadow = '0 0 8px #ffa502';
                document.querySelector('#btnPause span:last-child').textContent = currentLang === 'bn' ? '▶ চালু' :
                    '▶ Resume';
                btnStart.disabled = true;
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                updateUI();
            }
            const startTracking = function() {
                if (state.tracking && !state.paused) return;
                if (state.paused) { resumeTracking(); return; }
                state.tracking = true;
                state.paused = false;
                state.startTime = Date.now();
                state.elapsedBeforePause = 0;
                state.totalDistanceMeters = 0;
                state.positions = [];
                state.segmentDistances = [];
                state.lastPosition = null;
                footprintMarkers.clearLayers();
                annotationLayer.clearLayers();
                pathLine.setLatLngs([]);
                glowLine.setLatLngs([]);
                statusDot.classList.add('active');
                btnStart.disabled = true;
                btnPause.disabled = false;
                btnStop.disabled = false;
                document.querySelector('#btnStart span:last-child').textContent = '● ' + (currentLang === 'bn' ? 'চলছে' :
                    'Running');
                accuracyBadge.textContent = t('searching');
                accuracyBadge.style.color = '#ffa502';
                if (!state.watchId) startWatching();
                updateUI();
            };
            const togglePause = () => state.paused ? resumeTracking() : pauseTracking();
            const stopTracking = function() {
                if (!state.tracking) return;
                state.tracking = false;
                state.paused = false;
                statusDot.classList.remove('active');
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 6px #ff4757';
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;
                document.querySelector('#btnStart span:last-child').textContent = t('startBtn');
                document.querySelector('#btnPause span:last-child').textContent = t('pauseBtn');
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                accuracyBadge.textContent = t('stopped');
                accuracyBadge.style.color = '#ff4757';
                updateUI();
            };
            const resetAll = function() {
                if (state.watchId) { navigator.geolocation.clearWatch(state.watchId);
                    state.watchId = null; }
                if (state.animFrame) cancelAnimationFrame(state.animFrame);
                state.tracking = false;
                state.paused = false;
                state.positions = [];
                state.totalDistanceMeters = 0;
                state.startTime = null;
                state.elapsedBeforePause = 0;
                state.lastPosition = null;
                state.segmentDistances = [];
                state.animFrame = null;
                state.targetLatLng = null;
                footprintMarkers.clearLayers();
                annotationLayer.clearLayers();
                pathLine.setLatLngs([]);
                glowLine.setLatLngs([]);
                if (currentMarker) { map.removeLayer(currentMarker);
                    currentMarker = null; }
                statusDot.classList.remove('active');
                statusDot.style.background = '#ff4757';
                statusDot.style.boxShadow = '0 0 6px #ff4757';
                btnStart.disabled = false;
                btnPause.disabled = true;
                btnStop.disabled = true;
                document.querySelector('#btnStart span:last-child').textContent = t('startBtn');
                document.querySelector('#btnPause span:last-child').textContent = t('pauseBtn');
                speedVal.textContent = '0.0';
                speedMph.textContent = '0.0 mph';
                distVal.textContent = '0 ' + t('meters');
                distMiles.textContent = '0.00 ' + t('miles');
                timeVal.textContent = '00:00';
                segmentInfo.textContent = t('segmentNext');
                accuracyBadge.textContent = t('ready');
                accuracyBadge.style.color = '#a0a0b8';
                map.setView([23.6850, 90.3563], 7);
                startWatching();
                updateUI();
            };

            // Bind button events
            btnStart.addEventListener('click', startTracking);
            btnPause.addEventListener('click', togglePause);
            btnStop.addEventListener('click', stopTracking);
            document.getElementById('btnReset').addEventListener('click', resetAll);
            window.startTracking = startTracking;
            window.togglePause = togglePause;
            window.stopTracking = stopTracking;
            window.resetAll = resetAll;

            // ──────────────────────────── SHARE / PRINT ────────────────────────────
            window.sharePrintReport = function() {
                const posCount = state.positions.length;
                if (posCount === 0 && state.totalDistanceMeters === 0) {
                    alert('প্রথমে ট্র্যাকিং শুরু করুন এবং কিছু দূরত্ব অতিক্রম করুন।');
                    return;
                }
                const totalDist = formatDist(state.totalDistanceMeters);
                const totalDistMi = metersToMiles(state.totalDistanceMeters).toFixed(2);
                const elapsed = state.tracking ? getElapsed() : (state.elapsedBeforePause || 0);
                const totalTime = formatTime(elapsed);
                const avgSpeed = elapsed > 0 ? ((state.totalDistanceMeters / elapsed) * 3.6).toFixed(1) : '0.0';
                const lastPos = state.lastPosition;
                const centerLat = lastPos ? lastPos.lat : 23.6850;
                const centerLng = lastPos ? lastPos.lng : 90.3563;
                const vehicleName = vehicleIcons[state.vehicleType] || '🚗';
                const now = new Date().toLocaleString('bn-BD');

                const reportHTML = `

        <div class="row"><span>⚡ ${t('avgSpeed')}</span><span class="val">${avgSpeed} km/h</span></div>
        <div class="row"><span>🚗 ${t('vehicle')}</span><span class="val">${vehicleName}</span></div>
        <div class="row"><span>📍 ${t('pointsRecorded')}</span><span class="val">${posCount}</span></div>
        ${lastPos?`<div class="row"><span>🎯 শেষ অবস্থান</span><span class="val">${lastPos.lat.toFixed(5)}, ${lastPos.lng.toFixed(5)}</span></div>`:''}

if(w){w.document.write(reportHTML);w.document.close();}else{alert('পপ-আপ ব্লকড। দয়া করে পপ-আপ অনুমতি দিন।');}

// ──────────────────────────── LAND TOOLS ────────────────────────────
const unitToSqFt={katha:720,bigha:14400,decimal:435.6,kani:17280,gonda:864,kora:43.2,sqft:1,sqm:10.7639,acre:43560};
const unitNames={katha:'কাঠা',bigha:'বিঘা',decimal:'শতাংশ',kani:'কানি',gonda:'গণ্ডা',kora:'কড়া',sqft:'বর্গফুট',sqm:'বর্গমিটার',acre:'একর'};

window.convertUnits=function(){
const val=parseFloat(document.getElementById('convValue').value)||0;
const unit=document.getElementById('convUnit').value;
const sqft=val*unitToSqFt[unit];
let html='';
for(const[u,factor]of Object.entries(unitToSqFt)){
const converted=sqft/factor;
html+=`<div class="result-item"><span>${unitNames[u]}</span><span style="color:#fff!important;">${converted.toFixed(4)}</span></div>`;
}
document.getElementById('convResults').innerHTML=html;
};
function switchMainTab(tab){
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.querySelectorAll('.panel-content').forEach(p=>p.classList.remove('active'));
if(tab==='tracker'){
document.querySelector('.tab-btn[data-tab="tracker"]').classList.add('active');
document.getElementById('trackerContent').classList.add('active');
}else{
document.querySelector('.tab-btn[data-tab="land"]').classList.add('active');
document.getElementById('landContent').classList.add('active');
convertUnits();
}
}
function switchLandTab(tab){
document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
document.getElementById('landConversion').style.display='none';
document.getElementById('landArea').style.display='none';
document.getElementById('landPrice').style.display='none';
if(tab==='conversion'){
document.querySelector('.sub-tab[data-land="conversion"]').classList.add('active');
document.getElementById('landConversion').style.display='block';
convertUnits();
}else if(tab==='area'){
document.querySelector('.sub-tab[data-land="area"]').classList.add('active');
document.getElementById('landArea').style.display='block';
}else{
document.querySelector('.sub-tab[data-land="price"]').classList.add('active');
document.getElementById('landPrice').style.display='block';
}
}

// Survey
function onMapClick(e){if(!surveyActive)return;const{lat,lng}=e.latlng;addSurveyPoint(lat,lng);}
function addSurveyPoint(lat,lng){
surveyPoints.push({lat,lng});
L.marker([lat,lng],{color:'#ffa502'}).addTo(surveyMarkers);
if(surveyPoints.length>1){if(surveyLine)map.removeLayer(surveyLine);surveyLine=L.polyline(surveyPoints.map(p=>[p.lat,p.lng]),{color:'#ffa502',weight:3}).addTo(map);}
document.getElementById('surveyPointsList').innerHTML=surveyPoints.map((p,i)=>`পয়েন্ট ${i+1}: ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}`).join('<br>');
}
function startSurvey(){if(surveyPoints.length>0)clearSurvey();surveyActive=true;map.on('click',onMapClick);document.getElementById('surveyPointsList').innerHTML='<i>ম্যাপে ট্যাপ করে পয়েন্ট যোগ করুন</i>';}
function addCurrentLocationPoint(){if(navigator.geolocation)navigator.geolocation.getCurrentPosition(p=>addSurveyPoint(p.coords.latitude,p.coords.longitude),()=>alert('অবস্থান পাওয়া যায়নি'),{enableHighAccuracy:true});}
function closePolygon(){surveyActive=false;map.off('click',onMapClick);if(surveyPoints.length<3){alert('কমপক্ষে ৩টি পয়েন্ট প্রয়োজন');return;}
const areaSqM=computeArea(surveyPoints);const sqft=areaSqM*10.7639;const decimal=sqft/435.6;const katha=sqft/720;const bigha=sqft/14400;
document.getElementById('surveyAreaResult').innerHTML=`📐 <b>ক্ষেত্রফল:</b><br>${decimal.toFixed(4)} শতাংশ | ${katha.toFixed(4)} কাঠা | ${bigha.toFixed(4)} বিঘা<br>${sqft.toFixed(2)} বর্গফুট | ${areaSqM.toFixed(2)} বর্গমিটার`;}
function clearSurvey(){surveyActive=false;map.off('click',onMapClick);surveyMarkers.clearLayers();if(surveyLine){map.removeLayer(surveyLine);surveyLine=null;}surveyPoints=[];document.getElementById('surveyPointsList').innerHTML='';document.getElementById('surveyAreaResult').innerHTML='';}
function computeArea(points){const n=points.length;let area=0;for(let i=0;i<n;i++){const j=(i+1)%n;area+=points[i].lng*points[j].lat;area-=points[j].lng*points[i].lat;}area=Math.abs(area)/2;const latMid=points.reduce((s,p)=>s+p.lat,0)/n;const mPerDeg=111319.9*Math.cos(latMid*Math.PI/180);return area*(111319.9*mPerDeg);}
function calcTrapezoid(){const a=parseFloat(document.getElementById('trapSideA').value)||0;const b=parseFloat(document.getElementById('trapSideB').value)||0;if(a<=0||b<=0){document.getElementById('trapResult').innerHTML='⚠️ দয়া করে উভয় বাহুর মান দিন';return;}const avg=(a+b)/2;const sqft=avg*avg;const decimal=sqft/435.6;const katha=sqft/720;document.getElementById('trapResult').innerHTML=`📐 আনুমানিক: ${decimal.toFixed(4)} শতাংশ | ${katha.toFixed(4)} কাঠা | ${sqft.toFixed(2)} বর্গফুট`;}
function calcPrice(){const rate=parseFloat(document.getElementById('priceRate').value)||0;const unit=document.getElementById('priceUnit').value;const totalArea=parseFloat(document.getElementById('totalAreaInput').value)||0;if(rate<=0||totalArea<=0){document.getElementById('priceResult').innerHTML='⚠️ দাম ও পরিমাণ দিন';return;}const totalPrice=rate*totalArea;const totalSqft=totalArea*unitToSqFt[unit];let html=`<b style="color:#fff!important;">মোট মূল্য: ৳ ${totalPrice.toFixed(2)}</b><br><small style="color:#bbb!important;">(${totalArea} ${unitNames[unit]} × ৳ ${rate})</small><br><div style="margin-top:5px;color:#ddd!important;"><b>অন্যান্য এককে আনুমানিক দাম:</b></div>`;for(const[u,factor]of Object.entries(unitToSqFt)){if(u==='sqft'||u==='sqm')continue;const areaInUnit=totalSqft/factor;const ppu=areaInUnit>0?totalPrice/areaInUnit:0;html+=`<div class="result-item"><span>প্রতি ${unitNames[u]}</span><span style="color:#fff!important;">৳ ${ppu.toFixed(2)}</span><button class="copy-btn" onclick="navigator.clipboard.writeText('${ppu.toFixed(2)}')">📋</button></div>`;}document.getElementById('priceResult').innerHTML=html;}

// Event bindings
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){switchMainTab(this.getAttribute('data-tab'));}));
document.querySelectorAll('.sub-tab').forEach(b=>b.addEventListener('click',function(){switchLandTab(this.getAttribute('data-land'));}));
document.getElementById('btnStartSurvey').addEventListener('click',startSurvey);
document.getElementById('btnAddCurrent').addEventListener('click',addCurrentLocationPoint);
document.getElementById('btnClosePoly').addEventListener('click',closePolygon);
document.getElementById('btnClearSurvey').addEventListener('click',clearSurvey);
document.getElementById('btnCalcTrap').addEventListener('click',calcTrapezoid);
document.getElementById('btnCalcPrice').addEventListener('click',calcPrice);
window.switchMainTab=switchMainTab;window.switchLandTab=switchLandTab;
window.startSurvey=startSurvey;window.addCurrentLocationPoint=addCurrentLocationPoint;
window.closePolygon=closePolygon;window.clearSurvey=clearSurvey;
window.calcTrapezoid=calcTrapezoid;window.calcPrice=calcPrice;
